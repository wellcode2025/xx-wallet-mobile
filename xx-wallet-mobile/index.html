<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons. SVG is the primary for modern browsers; PNG sizes are
         fallbacks for browsers that don't accept SVG favicons (notably
         iOS Safari and some older Android browsers). -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- iOS home-screen icon. iOS auto-rounds the corners; the source PNG
         has square corners and the brand teal extends edge-to-edge. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="xx Wallet" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="xx Wallet" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts: Roboto (display, per xx network brand) + JetBrains Mono (addresses/amounts).
         Body font is Helvetica Neue with system fallback chain — no Google Fonts
         import because it's not a free webfont; it's loaded natively on Apple
         devices and falls back to Helvetica/Arial elsewhere. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>xx Wallet</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
