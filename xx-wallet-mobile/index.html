<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons. SVG is the primary for modern browsers; PNG sizes are
         fallbacks for browsers that don't accept SVG favicons (notably
         iOS Safari and some older Android browsers). -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- iOS home-screen icon. iOS auto-rounds the corners; the source PNG
         has square corners and the brand teal extends edge-to-edge. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS apple-touch-startup-image set. Generated by scripts/generate-splash.mjs.
         Each splash matches a specific iPhone/iPad device + DPR + portrait orientation.
         Replaces the white flash on launch with an ink-950 + brand-teal-logo splash
         that visually flows into App.tsx's loading state. -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-se-portrait.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-14-15-16-portrait.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-14-15-16-plus-portrait.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-14-15-pro-portrait.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-14-15-pro-max-portrait.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-16-pro-portrait.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-16-pro-max-portrait.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-portrait.png" media="(device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-mini-portrait.png" media="(device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-air-portrait.png" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-11-portrait.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-13-portrait.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

    <!-- user-scalable=no + maximum-scale=1.0 disable pinch-zoom. This is a
         deliberate native-app-feel choice for the installed PWA; on-screen
         legibility is served by an in-app font-size control (planned) rather
         than browser zoom. Modern iOS Safari ignores user-scalable=no
         regardless. Do not re-enable zoom without revisiting that decision. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="xx Wallet" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="xx Wallet" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonts: Roboto (display, per xx network brand) + JetBrains Mono (addresses/amounts).
         Body font is Helvetica Neue with system fallback chain — no Google Fonts
         import because it's not a free webfont; it's loaded natively on Apple
         devices and falls back to Helvetica/Arial elsewhere. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>xx Wallet</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
