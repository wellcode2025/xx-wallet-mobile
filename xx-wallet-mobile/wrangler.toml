# Cloudflare Workers config for xx-wallet-mobile.
#
# Deployment target for the static SPA bundle in dist/. When the GitHub-connected
# Worker on Cloudflare picks up a push to main, it runs:
#
#   1. (cd xx-wallet-mobile) npm install && npm run build
#   2. npx wrangler deploy
#
# Wrangler reads this file to know what to upload. We deploy as a Worker with a
# static-assets binding: the entry in `worker/index.ts` serves the built dist/
# via env.ASSETS (SPA routing fallback for deep links) for every route EXCEPT
# /xxdk-wasm/*, which it proxies to elixxir's CDN server-side — keeping the 45MB
# xxdk wasm off Cloudflare's 25 MiB static-asset cap while the browser only
# talks to this origin.
#
# The `name` here MUST match the existing Worker on Cloudflare so this
# becomes an update to that Worker rather than a new one — preserves the
# URL `xx-wallet-mobile.xx-network.workers.dev` and any custom domains
# we wire up later (e.g. mobile.xx.network).

name = "xx-wallet-mobile"
main = "worker/index.ts"
compatibility_date = "2026-05-05"

[assets]
# Path is relative to this wrangler.toml (i.e. xx-wallet-mobile/dist).
directory = "./dist"
# Binding so the Worker entry can serve assets (incl. SPA fallback) for
# non-proxy routes via env.ASSETS.fetch.
binding = "ASSETS"

# Any URL that doesn't match a static file serves index.html instead of
# 404. Required for React Router — without this, deep links like
# /tx/{id} or /send would 404 on direct visit / refresh.
not_found_handling = "single-page-application"

# Cleaner URL behaviour — auto-strips/adds trailing slashes for index.html
# lookups. Matches what we configured in the dashboard previously.
html_handling = "auto-trailing-slash"

# --- Beta channel (ADR-0016) -------------------------------------------------
# How beta actually deploys (PROJECT_STATE 2026-07-17): the GitHub-connected
# Workers Build watching `beta` treats it as a non-production branch and
# version-uploads to the SAME Worker as production (`name` above). It does
# NOT read this [env.beta] block and does not run `--env beta`. The upload
# is served at the branch preview alias
# beta-xx-wallet-mobile.<account>.workers.dev — a different origin from
# production, so browser storage stays isolated even on a shared Worker.
# Production only changes when the main-branch build runs `wrangler deploy`.
#
# The [env.beta] block below is therefore UNUSED by the current builds. Kept
# as the starting config should a dedicated beta Worker ever be wanted
# (assets restated because binding keys are not inherited by environments).
[env.beta]
name = "xx-wallet-mobile-beta"

[env.beta.assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"
